<form class="filters" method="get"><input name="project_no" placeholder="رقم المشروع" value="{{ request.args.get('project_no','') }}"><input name="q" placeholder="بحث عام" value="{{ request.args.get('q','') }}"><select name="governorate"><option value="">كل المحافظات</option>{% for x in ['بغداد','البصرة','نينوى','النجف','كربلاء','بابل','واسط','ذي قار','الأنبار','كركوك'] %}<option value="{{x}}" {% if request.args.get('governorate')==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select><select name="sector"><option value="">كل القطاعات</option>{% for x in ['الماء','الكهرباء','البلديات','الطرق والجسور','الإسكان','المجاري','الصحة','التعليم العالي'] %}<option value="{{x}}" {% if request.args.get('sector')==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select><select name="project_status"><option value="">كل الحالات</option>{% for x in PROJECT_STATUS %}<option value="{{x}}" {% if request.args.get('project_status')==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select><select name="project_condition"><option value="">كل المواقف</option>{% for x in PROJECT_CONDITION %}<option value="{{x}}" {% if request.args.get('project_condition')==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select><select name="importance_level"><option value="">كل الأهميات</option>{% for x in IMPORTANCE %}<option value="{{x}}" {% if request.args.get('importance_level')==x %}selected{% endif %}>{{x}}</option>{% endfor %}</select><button>فلترة</button><a class="btn muted" href="{{ request.path }}">عرض الكل</a></form>
